<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeQuest — Learn to Code</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    /* ── DESIGN TOKENS ── */
    :root {
      --bg:          #0e0f14;
      --bg3:         #1e2029;
      --surface:     #23262f;
      --border:      #2e3140;
      --text:        #e8eaf0;
      --muted:       #7b82a0;
      --accent:      #6c63ff;
      --accent2:     #ff6584;
      --accent3:     #43d9ad;
      --accent4:     #ffd166;
      --radius:      14px;
      --radius-sm:   8px;
      --shadow:      0 4px 24px rgba(0,0,0,.45);
      --ease:        .22s cubic-bezier(.4,0,.2,1);
      --body:        'DM Sans', sans-serif;
      --display:     'Syne', sans-serif;
      --mono:        'DM Mono', monospace;
    }
    [data-theme="light"] {
      --bg:      #f4f5fb;
      --bg3:     #e4e6f4;
      --surface: #ffffff;
      --border:  #d0d3e8;
      --text:    #1a1c2e;
      --muted:   #6b6f8e;
      --shadow:  0 4px 24px rgba(80,80,140,.12);
    }

    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: var(--body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background var(--ease), color var(--ease);
    }

    /* ── PAGE SYSTEM ── only .active page is shown ── */
    .page {
      display: none;
      padding: 70px 16px 40px;
      max-width: 640px;
      margin: 0 auto;
      animation: fadeUp .3s ease both;
    }
    .page.active { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── TOP NAV ── */
    .topnav {
      position: fixed; top: 0; left: 0; right: 0;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      z-index: 999;
      transition: background var(--ease);
    }
    .nav-brand {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--display); font-weight: 800; font-size: 1.1rem;
      letter-spacing: -.5px; color: var(--text);
    }
    .brand-icon { animation: pulse 2.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }

    .nav-right { display: flex; align-items: center; gap: 10px; }

    /* theme toggle */
    .theme-toggle { background: none; border: none; cursor: pointer; padding: 0; }
    .toggle-track {
      width: 54px; height: 28px; border-radius: 99px;
      background: var(--surface); border: 1px solid var(--border);
      display: flex; align-items: center; position: relative;
      transition: background var(--ease);
    }
    .toggle-thumb {
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--accent); position: absolute; left: 4px;
      transition: transform var(--ease);
    }
    [data-theme="light"] .toggle-thumb { transform: translateX(26px); }
    .toggle-icon { position: absolute; font-size: 11px; user-select: none; pointer-events: none; }
    .toggle-icon.sun  { right: 6px; }
    .toggle-icon.moon { left:  6px; }

    /* back button */
    .btn-back {
      display: none;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-family: var(--body); font-size: .83rem;
      font-weight: 500; padding: 6px 14px; border-radius: 99px; cursor: pointer;
      transition: background var(--ease), transform var(--ease);
    }
    .btn-back:hover { background: var(--bg3); transform: translateX(-2px); }

    /* ── HERO ── */
    .hero { text-align: center; padding: 20px 0 18px; }
    .hero-tag {
      display: inline-block;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; font-size: .76rem; font-weight: 600;
      padding: 5px 14px; border-radius: 99px; margin-bottom: 14px;
    }
    .hero-title {
      font-family: var(--display); font-size: clamp(1.9rem,8vw,2.7rem);
      font-weight: 800; line-height: 1.1; letter-spacing: -1.5px;
      margin-bottom: 12px;
    }
    .hero-title em {
      font-style: normal;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hero-sub { color: var(--muted); font-size: .9rem; line-height: 1.6; max-width: 300px; margin: 0 auto; }

    /* ── PROGRESS BAR (reused everywhere) ── */
    .prog-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px; margin: 18px 0;
    }
    .prog-label {
      display: flex; justify-content: space-between;
      font-size: .8rem; font-weight: 500; color: var(--muted); margin-bottom: 8px;
    }
    .prog-track {
      height: 8px; background: var(--bg3); border-radius: 99px; overflow: hidden;
    }
    .prog-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px; transition: width .6s cubic-bezier(.4,0,.2,1);
    }

    /* ── CARDS GRID ── */
    .cards-grid {
      display: grid; grid-template-columns: repeat(2,1fr); gap: 13px; margin-top: 4px;
    }
    .lang-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 14px 14px;
      cursor: pointer; position: relative; overflow: hidden;
      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
      animation: cardIn .4s ease both;
    }
    .lang-card:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: var(--shadow); border-color: var(--accent);
    }
    .lang-card:active { transform: scale(.97); }
    .lang-card:nth-child(1){animation-delay:.05s}
    .lang-card:nth-child(2){animation-delay:.10s}
    .lang-card:nth-child(3){animation-delay:.15s}
    .lang-card:nth-child(4){animation-delay:.20s}
    .lang-card:nth-child(5){animation-delay:.25s}
    .lang-card:nth-child(6){animation-delay:.30s}
    @keyframes cardIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .lang-card::before {
      content:''; position:absolute; top:0; left:0; right:0;
      height:3px; background:var(--card-color,var(--accent));
      transition: height .2s ease;
    }
    .lang-card:hover::before { height: 5px; }
    .card-icon { font-size: 1.9rem; margin-bottom: 9px; display: block; }
    .card-name { font-family: var(--display); font-size: .95rem; font-weight: 700; margin-bottom: 4px; }
    .card-desc { font-size: .73rem; color: var(--muted); line-height: 1.45; margin-bottom: 11px; }
    .card-prog { display: flex; align-items: center; gap: 7px; }
    .card-prog-bar { flex:1; height:4px; background:var(--bg3); border-radius:99px; overflow:hidden; }
    .card-prog-fill { height:100%; background:var(--card-color,var(--accent)); border-radius:99px; transition:width .6s ease; }
    .card-prog-pct { font-size:.68rem; font-weight:600; color:var(--muted); min-width:26px; text-align:right; }

    /* ── LESSONS PAGE HEADER ── */
    .lesson-header { padding: 6px 0 14px; text-align: center; }
    .lang-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--surface); border: 1px solid var(--border);
      padding: 5px 14px; border-radius: 99px; font-size: .8rem; font-weight: 600; margin-bottom: 8px;
    }
    .lesson-page-title { font-family: var(--display); font-size: 1.5rem; font-weight: 800; margin-bottom: 12px; }
    .lang-prog-wrap { display:flex; flex-direction:column; gap:5px; font-size:.78rem; color:var(--muted); font-weight:500; }

    /* ── TABS ── */
    .tab-bar {
      display: flex; gap: 5px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 99px; padding: 4px; margin-bottom: 16px;
    }
    .tab {
      flex:1; background:none; border:none; color:var(--muted);
      font-family:var(--body); font-size:.83rem; font-weight:500;
      padding:8px 10px; border-radius:99px; cursor:pointer;
      transition:background var(--ease),color var(--ease);
    }
    .tab.active { background:var(--accent); color:#fff; }
    .tab-content { display:none; }
    .tab-content.active { display:block; }

    /* ── LESSONS LIST ── */
    .lessons-list { display:flex; flex-direction:column; gap:9px; }
    .lesson-item {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:13px 15px;
      display:flex; align-items:center; gap:13px;
      cursor:pointer;
      transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease;
    }
    .lesson-item:hover { transform:translateX(4px); border-color:var(--accent); box-shadow:-3px 0 0 var(--accent); }
    .lesson-item.completed { opacity:.75; }
    .lesson-num {
      width:33px; height:33px; border-radius:50%;
      background:var(--bg3); border:2px solid var(--border);
      display:flex; align-items:center; justify-content:center;
      font-family:var(--mono); font-size:.78rem; font-weight:600; flex-shrink:0;
    }
    .lesson-item.completed .lesson-num { background:var(--accent3); border-color:var(--accent3); color:#0e0f14; }
    .lesson-info { flex:1; }
    .lesson-title { font-weight:600; font-size:.9rem; margin-bottom:2px; }
    .lesson-meta { font-size:.72rem; color:var(--muted); }
    .lesson-chevron { color:var(--muted); font-size:1.1rem; }
    .difficulty {
      font-size:.63rem; font-weight:700; letter-spacing:.5px;
      text-transform:uppercase; padding:2px 7px; border-radius:99px;
    }
    .difficulty.beginner     { background:rgba(67,217,173,.15); color:var(--accent3); }
    .difficulty.intermediate { background:rgba(255,209,102,.15); color:var(--accent4); }
    .difficulty.advanced     { background:rgba(255,101,132,.15); color:var(--accent2); }

    /* ── LESSON DETAIL ── */
    .lesson-detail-wrap { padding-bottom:32px; }
    .lesson-detail-header { margin-bottom:18px; padding-bottom:14px; border-bottom:1px solid var(--border); }
    .lesson-detail-title { font-family:var(--display); font-size:1.4rem; font-weight:800; margin:7px 0 5px; line-height:1.2; }
    .lesson-detail-meta { font-size:.78rem; color:var(--muted); display:flex; gap:11px; flex-wrap:wrap; }
    .lesson-body { font-size:.91rem; line-height:1.75; }
    .lesson-body p  { margin-bottom:13px; }
    .lesson-body h3 { font-family:var(--display); font-size:1rem; font-weight:700; margin:18px 0 7px; }
    .lesson-body code {
      font-family:var(--mono); font-size:.84em;
      background:var(--bg3); color:var(--accent3); padding:2px 6px; border-radius:5px;
    }
    .code-block {
      background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-sm);
      padding:15px; font-family:var(--mono); font-size:.81rem; line-height:1.7;
      overflow-x:auto; margin:11px 0 17px; color:var(--accent4); white-space:pre;
    }
    .key-point {
      background:linear-gradient(135deg,rgba(108,99,255,.12),rgba(255,101,132,.08));
      border:1px solid rgba(108,99,255,.25); border-radius:var(--radius-sm);
      padding:11px 15px; margin:13px 0; font-size:.86rem;
    }
    .key-point strong { color:var(--accent); }
    .btn-start-quiz {
      display:block; width:100%; margin-top:22px; padding:14px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      border:none; color:#fff; font-family:var(--display); font-size:.98rem;
      font-weight:700; border-radius:var(--radius); cursor:pointer;
      transition:opacity .2s,transform .2s;
    }
    .btn-start-quiz:hover  { opacity:.9; transform:translateY(-2px); }
    .btn-start-quiz:active { transform:scale(.98); }

    /* ── QUIZ ── */
    .quiz-wrap { padding-bottom:32px; }
    .quiz-header { text-align:center; margin-bottom:22px; }
    .quiz-title { font-family:var(--display); font-size:1.35rem; font-weight:800; margin-bottom:5px; }
    .quiz-prog-text { font-size:.8rem; color:var(--muted); }
    .quiz-q-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:18px; margin-bottom:14px;
    }
    .question-text { font-size:.95rem; font-weight:600; line-height:1.5; margin-bottom:16px; }
    .options-list { display:flex; flex-direction:column; gap:9px; list-style:none; }
    .option-btn {
      background:var(--bg3); border:1.5px solid var(--border);
      border-radius:var(--radius-sm); color:var(--text);
      font-family:var(--body); font-size:.86rem;
      padding:11px 15px; text-align:left; cursor:pointer; width:100%;
      transition:border-color .18s,background .18s,transform .15s;
    }
    .option-btn:hover    { border-color:var(--accent); transform:translateX(3px); }
    .option-btn.correct  { border-color:var(--accent3); background:rgba(67,217,173,.12); color:var(--accent3); }
    .option-btn.wrong    { border-color:var(--accent2); background:rgba(255,101,132,.12); color:var(--accent2); }
    .option-btn:disabled { cursor:default; }
    .quiz-feedback {
      font-size:.83rem; padding:9px 13px; border-radius:var(--radius-sm);
      margin-top:11px; font-weight:500; display:none;
    }
    .quiz-feedback.show    { display:block; }
    .quiz-feedback.correct { background:rgba(67,217,173,.12); color:var(--accent3); }
    .quiz-feedback.wrong   { background:rgba(255,101,132,.12); color:var(--accent2); }
    .btn-next-q {
      width:100%; margin-top:13px; padding:13px;
      background:var(--accent); border:none; color:#fff;
      font-family:var(--display); font-size:.93rem; font-weight:700;
      border-radius:var(--radius); cursor:pointer;
      transition:opacity .2s,transform .2s; display:none;
    }
    .btn-next-q.show  { display:block; }
    .btn-next-q:hover { opacity:.88; transform:translateY(-2px); }

    /* ── RESULT ── */
    .result-wrap { text-align:center; padding:28px 0; }
    .result-emoji {
      font-size:3.8rem; margin-bottom:14px; display:block;
      animation:bounceIn .6s cubic-bezier(.36,.07,.19,.97) both;
    }
    @keyframes bounceIn { 0%{transform:scale(0);opacity:0} 60%{transform:scale(1.15);opacity:1} 100%{transform:scale(1)} }
    .result-title { font-family:var(--display); font-size:1.6rem; font-weight:800; margin-bottom:7px; }
    .result-score { font-size:.95rem; color:var(--muted); margin-bottom:22px; }
    .score-circle {
      width:118px; height:118px; border-radius:50%;
      background:conic-gradient(var(--accent) var(--score-deg,0deg),var(--bg3) 0deg);
      display:flex; align-items:center; justify-content:center;
      margin:0 auto 22px; position:relative;
    }
    .score-circle::after {
      content:''; width:86px; height:86px; border-radius:50%;
      background:var(--bg); position:absolute;
    }
    .score-circle-text {
      position:relative; z-index:1;
      font-family:var(--display); font-size:1.45rem; font-weight:800;
    }
    .result-message { font-size:.88rem; color:var(--muted); max-width:270px; margin:0 auto 26px; line-height:1.6; }
    .result-actions { display:flex; flex-direction:column; gap:9px; }
    .btn-primary {
      padding:13px 24px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      border:none; color:#fff; font-family:var(--display); font-size:.93rem;
      font-weight:700; border-radius:var(--radius); cursor:pointer;
      transition:opacity .2s,transform .2s;
    }
    .btn-primary:hover { opacity:.88; transform:translateY(-2px); }
    .btn-secondary {
      padding:13px 24px; background:var(--surface); border:1px solid var(--border);
      color:var(--text); font-family:var(--display); font-size:.93rem;
      font-weight:700; border-radius:var(--radius); cursor:pointer;
      transition:background .18s,transform .2s;
    }
    .btn-secondary:hover { background:var(--bg3); transform:translateY(-2px); }

    /* ── CODE EDITOR ── */
    .editor-wrap { display:flex; flex-direction:column; gap:9px; }
    .editor-toolbar {
      display:flex; align-items:center; gap:8px;
      background:var(--bg3); border:1px solid var(--border);
      border-radius:var(--radius-sm) var(--radius-sm) 0 0; padding:8px 12px;
    }
    .editor-lang-label { font-family:var(--mono); font-size:.76rem; font-weight:500; color:var(--accent3); flex:1; }
    .btn-run {
      background:var(--accent3); border:none; color:#0e0f14;
      font-family:var(--body); font-size:.78rem; font-weight:700;
      padding:6px 13px; border-radius:99px; cursor:pointer;
      transition:opacity .18s,transform .15s;
    }
    .btn-run:hover { opacity:.85; transform:scale(1.05); }
    .btn-clear {
      background:var(--surface); border:1px solid var(--border); color:var(--muted);
      font-family:var(--body); font-size:.78rem; padding:6px 12px;
      border-radius:99px; cursor:pointer; transition:background .15s;
    }
    .btn-clear:hover { background:var(--bg3); }
    .code-editor {
      width:100%; min-height:210px;
      background:var(--bg); border:1px solid var(--border); border-top:none;
      border-radius:0 0 var(--radius-sm) var(--radius-sm);
      color:var(--accent4); font-family:var(--mono); font-size:.82rem;
      line-height:1.7; padding:13px; resize:vertical; outline:none;
      transition:border-color .2s;
    }
    .code-editor:focus { border-color:var(--accent); }
    .editor-output-label {
      font-size:.76rem; font-weight:600; color:var(--muted);
      text-transform:uppercase; letter-spacing:.5px;
    }
    .editor-output {
      background:var(--bg); border:1px solid var(--border);
      border-radius:var(--radius-sm); padding:13px;
      font-family:var(--mono); font-size:.8rem; line-height:1.7;
      color:var(--accent3); min-height:78px; white-space:pre-wrap;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width:5px; height:5px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }

    /* ── RESPONSIVE ── */
    @media (max-width:360px) {
      .cards-grid { grid-template-columns:1fr; }
      .hero-title  { font-size:1.65rem; }
    }
    @media (min-width:480px) {
      .page       { padding:78px 24px 48px; }
      .cards-grid { gap:15px; }
    }
  </style>
</head>
<body>

  <!-- ===== NAV ===== -->
  <nav class="topnav">
    <div class="nav-brand">
      <span class="brand-icon">⚡</span>
      <span>CodeQuest</span>
    </div>
    <div class="nav-right">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <span class="toggle-track">
          <span class="toggle-thumb"></span>
          <span class="toggle-icon sun">☀️</span>
          <span class="toggle-icon moon">🌙</span>
        </span>
      </button>
      <button class="btn-back" id="btnBack">← Back</button>
    </div>
  </nav>

  <!-- ===== HOME ===== -->
  <section class="page active" id="page-home">
    <div class="hero">
      <div class="hero-tag">🚀 Your coding journey starts here</div>
      <h1 class="hero-title">Learn. Code.<br><em>Level&nbsp;Up.</em></h1>
      <p class="hero-sub">Pick a language below and start your adventure — lessons, quizzes, and a live editor all in one place.</p>
    </div>
    <div class="prog-wrap">
      <div class="prog-label"><span>Overall Progress</span><span id="overallPercent">0%</span></div>
      <div class="prog-track"><div class="prog-fill" id="overallBar" style="width:0%"></div></div>
    </div>
    <div class="cards-grid" id="cardsGrid"></div>
  </section>

  <!-- ===== LESSONS ===== -->
  <section class="page" id="page-lessons">
    <div class="lesson-header">
      <div class="lang-badge" id="lessonLangBadge"></div>
      <h2 class="lesson-page-title" id="lessonPageTitle">Lessons</h2>
      <div class="lang-prog-wrap">
        <span id="langProgressLabel">0% complete</span>
        <div class="prog-track"><div class="prog-fill" id="langProgressBar" style="width:0%"></div></div>
      </div>
    </div>
    <div class="tab-bar">
      <button class="tab active" data-tab="lessons">📚 Lessons</button>
      <button class="tab" data-tab="editor">💻 Editor</button>
    </div>
    <div class="tab-content active" id="tab-lessons">
      <div class="lessons-list" id="lessonsList"></div>
    </div>
    <div class="tab-content" id="tab-editor">
      <div class="editor-wrap">
        <div class="editor-toolbar">
          <span class="editor-lang-label" id="editorLangLabel">Python</span>
          <button class="btn-run" id="btnRun">▶ Run</button>
          <button class="btn-clear" id="btnClear">✕ Clear</button>
        </div>
        <textarea class="code-editor" id="codeEditor" spellcheck="false" placeholder="// Write your code here and click Run!"></textarea>
        <div class="editor-output-label">Output:</div>
        <div class="editor-output" id="editorOutput">Your output will appear here…</div>
      </div>
    </div>
  </section>

  <!-- ===== LESSON DETAIL ===== -->
  <section class="page" id="page-lesson-detail">
    <div class="lesson-detail-wrap" id="lessonDetailWrap"></div>
  </section>

    /* ============================================================
       STATE
    ============================================================ */
    let progress        = JSON.parse(localStorage.getItem("cq_progress") || "{}");
    let currentLang     = null;
    let currentLesson   = null;
    let currentQuiz     = null;
    let currentQuestion = 0;
    let quizScore       = 0;

    /* ============================================================
       HELPERS
    ============================================================ */
    const saveProgress = () => localStorage.setItem("cq_progress", JSON.stringify(progress));

    const getLangPct = (lang) => {
      const done = lang.lessons.filter(l => progress[l.id]).length;
      return Math.round((done / lang.lessons.length) * 100);
    };

    const getOverallPct = () => {
      const total = LANGUAGES.reduce((a, l) => a + l.lessons.length, 0);
      return Math.round((Object.keys(progress).length / total) * 100);
    };

    /* Show one page, hide the rest */
    function showPage(id) {
      document.querySelectorAll(".page").forEach(p => {
        p.classList.remove("active");
      });
      const pg = document.getElementById(id);
      if (!pg) return;
      pg.classList.add("active");
      // re-trigger animation
      pg.style.animation = "none";
      requestAnimationFrame(() => { pg.style.animation = ""; });
      // back button visibility
      document.getElementById("btnBack").style.display =
        id === "page-home" ? "none" : "block";
    }

    function goBack() {
      const cur = document.querySelector(".page.active")?.id;
      if      (cur === "page-lessons")       showPage("page-home");
      else if (cur === "page-lesson-detail") showPage("page-lessons");
      else if (cur === "page-quiz")          showPage("page-lesson-detail");
      else if (cur === "page-result")        showPage("page-lessons");
      else showPage("page-home");
    }

    /* ============================================================
       HOME
    ============================================================ */
    function renderHome() {
      const grid = document.getElementById("cardsGrid");
      grid.innerHTML = "";
      LANGUAGES.forEach(lang => {
        const pct = getLangPct(lang);
        const card = document.createElement("div");
        card.className = "lang-card";
        card.style.setProperty("--card-color", lang.color);
        card.innerHTML = `
          <span class="card-icon">${lang.icon}</span>
          <div class="card-name">${lang.name}</div>
          <div class="card-desc">${lang.desc}</div>
          <div class="card-prog">
            <div class="card-prog-bar">
              <div class="card-prog-fill" style="width:${pct}%"></div>
            </div>
            <span class="card-prog-pct">${pct}%</span>
          </div>`;
        card.addEventListener("click", () => openLanguage(lang));
        grid.appendChild(card);
      });
      const ov = getOverallPct();
      document.getElementById("overallPercent").textContent = ov + "%";
      document.getElementById("overallBar").style.width = ov + "%";
    }

    /* ============================================================
       LESSONS
    ============================================================ */
    function openLanguage(lang) {
      currentLang = lang;
      document.getElementById("lessonLangBadge").innerHTML   = `${lang.icon} ${lang.name}`;
      document.getElementById("lessonPageTitle").textContent = `${lang.name} Lessons`;
      document.getElementById("editorLangLabel").textContent = lang.name;
      document.getElementById("codeEditor").value            = starterCode(lang.id);
      updateLangBar();
      renderLessons();
      switchTab("lessons");
      showPage("page-lessons");
    }

    function updateLangBar() {
      const pct = getLangPct(currentLang);
      document.getElementById("langProgressLabel").textContent = pct + "% complete";
      document.getElementById("langProgressBar").style.width  = pct + "%";
    }

    function renderLessons() {
      const list = document.getElementById("lessonsList");
      list.innerHTML = "";
      currentLang.lessons.forEach((lesson, i) => {
        const done = !!progress[lesson.id];
        const item = document.createElement("div");
        item.className = "lesson-item" + (done ? " completed" : "");
        item.innerHTML = `
          <div class="lesson-num">${done ? "✓" : i + 1}</div>
          <div class="lesson-info">
            <div class="lesson-title">${lesson.title}</div>
            <div class="lesson-meta">
              <span class="difficulty ${lesson.difficulty}">${lesson.difficulty}</span>
              ⏱ ${lesson.duration}
            </div>
          </div>
          <span class="lesson-chevron">›</span>`;
        item.addEventListener("click", () => openLesson(lesson));
        list.appendChild(item);
      });
    }

    /* ============================================================
       LESSON DETAIL
    ============================================================ */
    function openLesson(lesson) {
      currentLesson = lesson;
      document.getElementById("lessonDetailWrap").innerHTML = `
        <div class="lesson-detail-header">
          <span class="difficulty ${lesson.difficulty}">${lesson.difficulty}</span>
          <h2 class="lesson-detail-title">${lesson.title}</h2>
          <div class="lesson-detail-meta">
            <span>📖 ${currentLang.name}</span>
            <span>⏱ ${lesson.duration}</span>
            <span>${progress[lesson.id] ? "✅ Completed" : "🔓 In Progress"}</span>
          </div>
        </div>
        <div class="lesson-body">${lesson.content}</div>
        <button class="btn-start-quiz" id="btnStartQuiz">Take the Quiz →</button>`;
      document.getElementById("btnStartQuiz").addEventListener("click", () => startQuiz(lesson));
      showPage("page-lesson-detail");
    }

    /* ============================================================
       QUIZ
    ============================================================ */
    function startQuiz(lesson) {
      currentQuiz = lesson.quiz;
      currentQuestion = 0;
      quizScore = 0;
      showPage("page-quiz");
      renderQuestion();
    }

    function renderQuestion() {
      const q     = currentQuiz[currentQuestion];
      const total = currentQuiz.length;
      const pct   = Math.round((currentQuestion / total) * 100);
      document.getElementById("quizWrap").innerHTML = `
        <div class="quiz-header">
          <div class="quiz-title">🧠 Quick Quiz</div>
          <div class="quiz-prog-text">Question ${currentQuestion + 1} of ${total}</div>
          <div class="prog-wrap" style="margin-top:10px">
            <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
          </div>
        </div>
        <div class="quiz-q-card">
          <div class="question-text">${q.q}</div>
          <ul class="options-list">
            ${q.options.map((opt, i) => `
              <li><button class="option-btn" data-idx="${i}">${opt}</button></li>
            `).join("")}
          </ul>
          <div class="quiz-feedback" id="quizFeedback"></div>
        </div>
        <button class="btn-next-q" id="btnNextQ">
          ${currentQuestion + 1 < total ? "Next Question →" : "See Results 🎉"}
        </button>`;

      document.querySelectorAll(".option-btn").forEach(btn => {
        btn.addEventListener("click", () => handleAnswer(+btn.dataset.idx, q.answer));
      });
      document.getElementById("btnNextQ").addEventListener("click", () => {
        currentQuestion++;
        currentQuestion < currentQuiz.length ? renderQuestion() : showResult();
      });
    }

    function handleAnswer(selected, correct) {
      document.querySelectorAll(".option-btn").forEach(b => b.disabled = true);
      const feedback = document.getElementById("quizFeedback");
      const nextBtn  = document.getElementById("btnNextQ");
      if (selected === correct) {
        quizScore++;
        document.querySelectorAll(".option-btn")[selected].classList.add("correct");
        feedback.textContent = "✅ Correct! Great job!";
        feedback.className   = "quiz-feedback show correct";
      } else {
        document.querySelectorAll(".option-btn")[selected].classList.add("wrong");
        document.querySelectorAll(".option-btn")[correct].classList.add("correct");
        feedback.textContent = `❌ Not quite. Correct: "${currentQuiz[currentQuestion].options[correct]}"`;
        feedback.className   = "quiz-feedback show wrong";
      }
      nextBtn.classList.add("show");
    }

    /* ============================================================
       RESULT
    ============================================================ */
    function showResult() {
      const total  = currentQuiz.length;
      const pct    = Math.round((quizScore / total) * 100);
      const passed = pct >= 60;
      const deg    = Math.round((pct / 100) * 360);

      if (passed && currentLesson) {
        progress[currentLesson.id] = true;
        saveProgress();
        updateLangBar();
        renderLessons();
        renderHome();
      }

      const emoji   = pct === 100 ? "🏆" : pct >= 80 ? "🎉" : pct >= 60 ? "👍" : "💪";
      const message = pct === 100 ? "Perfect score! You've mastered this lesson!"
                    : pct >= 80   ? "Excellent work! Solid understanding."
                    : pct >= 60   ? "Good job! You passed — keep practising."
                    :               "Almost there! Review the lesson and try again.";

      document.getElementById("resultWrap").innerHTML = `
        <span class="result-emoji">${emoji}</span>
        <h2 class="result-title">${passed ? "Lesson Complete!" : "Keep Going!"}</h2>
        <div class="score-circle" style="--score-deg:${deg}deg">
          <span class="score-circle-text">${pct}%</span>
        </div>
        <p class="result-score">${quizScore} / ${total} correct</p>
        <p class="result-message">${message}</p>
        <div class="result-actions">
          <button class="btn-primary" id="btnContinue">← Back to Lessons</button>
          ${!passed ? `<button class="btn-secondary" id="btnRetry">🔁 Retry Quiz</button>` : ""}
        </div>`;

      document.getElementById("btnContinue").addEventListener("click", () => showPage("page-lessons"));
      const rb = document.getElementById("btnRetry");
      if (rb) rb.addEventListener("click", () => startQuiz(currentLesson));
      showPage("page-result");
    }

    /* ============================================================
       EDITOR
    ============================================================ */
    function starterCode(id) {
      return ({
        python:     '# Python starter\nname = "World"\nprint("Hello,", name)\n\n# Try it!',
        javascript: '// JavaScript starter\nconst name = "World";\nconsole.log("Hello, " + name);\nconsole.log(2 + 2);',
        html:       '<!-- HTML starter -->\n<h1>Hello World</h1>\n<p>This is a paragraph.</p>',
        css:        '/* CSS preview */\nbody {\n  background: #1a1a2e;\n  color: white;\n}',
        java:       '// Java (simulated)\npublic class Main {\n    public static void main(String[] args) {\n        System.out.println("Hello, Java!");\n        System.out.println("Sum: " + (10 + 20));\n    }\n}',
        cpp:        '// C++ (simulated)\n#include <iostream>\nusing namespace std;\nint main() {\n    cout << "Hello, C++!" << endl;\n    cout << "5 squared = " << 5*5 << endl;\n    return 0;\n}',
      })[id] || "// Write your code here";
    }

    function runCode() {
      const code   = document.getElementById("codeEditor").value;
      const output = document.getElementById("editorOutput");
      const id     = currentLang?.id || "javascript";
      let result   = "";
      try {
        if (id === "javascript") {
          const logs = [];
          new Function("console", code)({ log: (...a) => logs.push(a.join(" ")) });
          result = logs.join("\n") || "(no output)";
        } else if (id === "python") {
          const lines = []; let m;
          const re = /print\(([^)]+)\)/g;
          while ((m = re.exec(code))) lines.push(m[1].replace(/['"]/g,"").replace(/,\s*/g," "));
          result = lines.join("\n") || "(no print statements found)";
        } else if (id === "java") {
          const lines = []; let m;
          const re = /System\.out\.println\(([^)]+)\)/g;
          while ((m = re.exec(code))) lines.push(m[1].replace(/['"]/g,"").replace(/\s*\+\s*/g,""));
          result = lines.join("\n") || "(no println statements found)";
        } else if (id === "cpp") {
          const lines = []; let m;
          const re = /cout\s*<<\s*([^;]+)/g;
          while ((m = re.exec(code))) lines.push(m[1].replace(/endl/g,"").replace(/<<\s*/g," ").replace(/['"]/g,"").trim());
          result = lines.join("\n") || "(no cout statements found)";
        } else if (id === "html") {
          result = "[HTML Preview]\n" + code.replace(/<[^>]+>/g,"").replace(/\n{3,}/g,"\n\n").trim();
        } else if (id === "css") {
          result = "[CSS Preview]\n" + code;
        }
      } catch(e) { result = "⚠ Error: " + e.message; }

      output.textContent = result;
      output.style.transition = "none";
      output.style.borderColor = "var(--accent3)";
      setTimeout(() => { output.style.transition = "border-color .4s"; output.style.borderColor = "var(--border)"; }, 600);
    }

    /* ============================================================
       TABS
    ============================================================ */
    function switchTab(name) {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
      const t = document.querySelector(`.tab[data-tab="${name}"]`);
      const c = document.getElementById(`tab-${name}`);
      if (t) t.classList.add("active");
      if (c) c.classList.add("active");
    }

    /* ============================================================
       THEME
    ============================================================ */
    function initTheme() {
      const saved = localStorage.getItem("cq_theme") || "dark";
      document.documentElement.setAttribute("data-theme", saved);
    }
    function toggleTheme() {
      const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      localStorage.setItem("cq_theme", next);
    }

    /* ============================================================
       BOOT
    ============================================================ */
    document.addEventListener("DOMContentLoaded", () => {
      initTheme();
      renderHome();
      document.getElementById("themeToggle").addEventListener("click", toggleTheme);
      document.getElementById("btnBack").addEventListener("click", goBack);
      document.querySelector(".tab-bar").addEventListener("click", e => {
        const tab = e.target.closest(".tab");
        if (tab) switchTab(tab.dataset.tab);
      });
      document.getElementById("btnRun").addEventListener("click", runCode);
      document.getElementById("btnClear").addEventListener("click", () => {
        document.getElementById("codeEditor").value = "";
        document.getElementById("editorOutput").textContent = "Your output will appear here…";
      });
      document.getElementById("codeEditor").addEventListener("keydown", e => {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") { e.preventDefault(); runCode(); }
      });
    });
  </script>
</body>
</html>
